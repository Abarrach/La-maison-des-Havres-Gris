<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Carte des bases – Maison des Havres Gris</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js" defer></script>
  
  <style>
    /* === MODALE === */
    #custom-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(3px);
        z-index: 10000; justify-content: center; align-items: center;
    }
    .modal-box {
        background: #14100a; border: 2px solid #cda434; padding: 25px;
        width: 400px; max-width: 90%; text-align: center; border-radius: 6px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8), 0 0 10px rgba(205, 164, 52, 0.2);
        animation: fadeIn 0.3s ease;
    }
    .modal-title { 
        color: #cda434; font-family: 'Cinzel', serif; font-size: 1.4em; 
        margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; 
    }
    .modal-message { color: #ccc; margin-bottom: 20px; font-size: 1em; line-height: 1.5; }
    .modal-input-field {
        width: 100%; padding: 10px; margin-bottom: 20px;
        background: #000; border: 1px solid #cda434; color: #fff;
        border-radius: 4px; box-sizing: border-box; font-family: sans-serif;
        display: none;
    }
    .modal-input-field:focus { outline: none; box-shadow: 0 0 10px #cda434; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .modal-btn {
        padding: 10px 20px; border: 1px solid #555; cursor: pointer;
        font-weight: bold; text-transform: uppercase; border-radius: 3px;
        flex: 1; transition: all 0.2s; color: #fff;
    }
    .modal-btn-confirm { background: linear-gradient(180deg, #cda434 0%, #8a6e23 100%); border-color: #ffd700; color: #1a0505; }
    .modal-btn-confirm:hover { background: #eac154; box-shadow: 0 0 15px rgba(205, 164, 52, 0.4); }
    .modal-btn-cancel { background: #333; border-color: #555; color: #aaa; }
    .modal-btn-cancel:hover { background: #444; color: #fff; }

    /* === BOUTON TOGGLE ADMIN (CORRIGÉ) === */
    .admin-toggle-btn {
        position: fixed; 
        /* On déplace un peu pour ne pas mordre la ligne */
        top: 105px; 
        right: 35px; /* Plus d'espace à droite */
        z-index: 2000;
        
        background: #0b0b0b; 
        border: 2px solid #cda434; 
        color: #cda434; 
        
        width: 42px; height: 42px; 
        border-radius: 50%;
        font-size: 1.4em; 
        cursor: pointer; 
        
        box-shadow: 0 0 15px rgba(0,0,0,0.8); 
        transition: all 0.4s ease; 
        
        display: none; /* Géré par JS */
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    .admin-toggle-btn:hover { 
        background: #1a1510; 
        color: #fff; 
        transform: rotate(90deg); 
        box-shadow: 0 0 15px #cda434; 
    }

    /* Le panneau admin */
    .admin-panel {
        position: fixed; top: 155px; right: 35px; z-index: 1999;
        background: rgba(20, 16, 10, 0.95); border: 1px solid #cda434;
        padding: 15px; border-radius: 6px; width: 250px;
        box-shadow: 0 0 20px rgba(0,0,0,0.9);
        display: none; 
    }
    .admin-panel.visible { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <script>
    function logout() {
      localStorage.removeItem("user");
      localStorage.removeItem("role");
      window.location.href = "index.html";
    }
  </script>
</head>

<body class="fade-in">
  
  <header>
    <div id="user-info">Chargement...</div>
    <div class="title">Maison des Havres Gris</div>
    <div class="header-controls">
        <a href="menu.html" class="disconnect">Menu</a>
        <button class="disconnect" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <div id="map-switcher">
    <button class="map-switch-btn active" data-map="hagga">Bassin de Hagga</button>
    <button class="map-switch-btn" data-map="deep_desert">Deep Desert</button>
  </div>

  <div id="storm-timer">
    <span class="timer-icon">🌪️</span>
    <span id="timer-text">Calcul...</span>
  </div>

  <div id="map-container">
    <div id="map"></div>
  </div>

  <div id="player-panel">
    <h3>Infos sur cette carte</h3>
    <div id="player-list"></div>
  </div>

  <button id="toggle-players" class="toggle-players" title="Afficher les joueurs">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#2d1804" width="30px" height="30px">
      <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
    </svg>
  </button>

  <button id="admin-toggle" class="admin-toggle-btn" title="Outils Admin">⚙️</button>

  <div id="custom-modal-overlay">
    <div class="modal-box">
        <h3 id="modal-title" class="modal-title">TITRE</h3>
        <p id="modal-message" class="modal-message">Message...</p>
        <input type="text" id="modal-input" class="modal-input-field" placeholder="Votre note ici...">
        <div class="modal-buttons">
            <button id="modal-btn-cancel" class="modal-btn modal-btn-cancel">Annuler</button>
            <button id="modal-btn-confirm" class="modal-btn modal-btn-confirm">Confirmer</button>
        </div>
    </div>
  </div>

</body>
</html>
